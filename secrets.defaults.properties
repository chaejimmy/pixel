# ============================================================================
# PaceDream Android – default (placeholder) secrets
# ============================================================================
# These values are checked into git and used when secrets.properties is absent.
# They are intentionally DEVELOPMENT placeholders so debug builds succeed
# without real credentials; features that require a real key will degrade
# gracefully.
#
# IMPORTANT: never assume any value below is safe for production.
# `app/build.gradle.kts` rejects release builds when these placeholders leak
# through (blank Stripe key, dev- Auth0 tenant, PD_ENVIRONMENT=development).
# Production values must come from secrets.properties (gitignored) or CI
# `-P…` gradle properties.
#
# For real values, copy secrets.properties.template -> secrets.properties and
# fill in your credentials (secrets.properties is gitignored).
# ============================================================================

# ── Environment ────────────────────────────────────────────────────────────
# Release builds REQUIRE PD_ENVIRONMENT=production via secrets.properties.
PD_ENVIRONMENT=development

# ── Backend / Frontend URLs (matches iOS Release.xcconfig) ────────────────
SERVICE_URL=https://pacedream-backend.onrender.com/v1/
FRONTEND_BASE_URL=https://www.pacedream.com

# ── Staging URLs (consumed by the `staging` product flavor only) ──────────
# Build with `./gradlew assembleStagingDebug` to point the app at these.
# When unset, the staging flavor falls back to the production URLs above.
#STAGING_SERVICE_URL=https://staging-api.pacedream.com/v1/
#STAGING_FRONTEND_BASE_URL=https://staging.pacedream.com

# ── Auth0 (DEVELOPMENT TENANT — NOT FOR RELEASE) ──────────────────────────
# This `dev-…` tenant is intended for local debug builds only.  Release
# builds MUST override with the production tenant in secrets.properties;
# the gradle release guard rejects any AUTH0_DOMAIN starting with `dev-`.
AUTH0_DOMAIN=dev-ygmeh25wmmszid8u.us.auth0.com
AUTH0_CLIENT_ID=3DCwI5MfeTuL0SETFnNEGoRmRyJGpEDp
AUTH0_AUDIENCE=

# ── Stripe (payment features disabled when blank) ────────────────────────
# iOS loads from Secrets-Release.xcconfig (pk_live_…) / Secrets-Debug.xcconfig (pk_test_…).
# Set your key in secrets.properties or via CI -PstripePublishableKey=…
STRIPE_PUBLISHABLE_KEY=

# ── OneSignal (synced from iOS Debug.xcconfig) ───────────────────────────
# This is the shared dev/test App ID. Production App ID goes in secrets.properties.
ONESIGNAL_APP_ID=4c470d65-5e90-48ce-889c-048822422dde

# ── Cloudinary (synced from iOS Debug.xcconfig) ──────────────────────────
# Used by ImageUploadService for backend-routed uploads.
CLOUDINARY_CLOUD_NAME=dmsrirblv
CLOUDINARY_UPLOAD_PRESET=unsigned_preset

# ── Google Maps (map preview shows blank when key is empty) ──────────────
# Requires a platform-specific Android API key from Google Cloud Console.
GOOGLE_MAPS_API_KEY=AIzaSyDzjIBl_l5jFRyHuuSEB_T78MIepZ-YKos